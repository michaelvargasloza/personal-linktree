<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="favicon.ico" type="image/png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Michael Vargas Loza</title>
        <meta name="description"
        content="Systems Engineer, Full Stack Developer, AI Integrations & GenAI Enthusiast">
        <meta property="og:title" content="Michael Vargas Loza">
        <meta property="og:description"
        content="Systems Engineer | Full Stack Developer | AI Integrations & GenAI Enthusiast">
        <meta property="og:image" content="profile.jpg">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:'Inter',sans-serif;
            }

            body{
                background:#000;
                color:white;
                display:flex;
                justify-content:center;
                padding:30px 20px;
            }

            .container{
                width:100%;
                max-width:550px;
                text-align:center;
            }

            .profile{
                margin-bottom:25px;
            }

            .profile img{
                width:140px;
                height:140px;
                border-radius:50%;
                object-fit:cover;
                border:4px solid #222;
            }

            .username{
                font-size:3rem;
                font-weight:800;
                margin-top:20px;
            }

            .bio{
                margin-top:15px;
                font-size:1.2rem;
                line-height:1.6;
                color:#e0e0e0;
            }

            .socials{
                display:flex;
                justify-content:center;
                gap:22px;
                margin:30px 0;
            }

            .socials a{
                color:white;
                font-size:2rem;
                text-decoration:none;
                transition:.2s;
            }

            .socials a:hover{
                transform:scale(1.15);
            }

            .link-card{
                background:#151515;
                border-radius:28px;
                margin-bottom:18px;
                padding:24px;
                display:flex;
                align-items:center;
                justify-content:space-between;
                cursor:pointer;
                transition:.25s;
            }

            .link-card:hover{
                background:#202020;
            }

            .link-name{
                font-size:1.35rem;
                font-weight:600;
                flex:1;
                text-align:center;
            }

            .menu-btn{
                font-size:1.6rem;
                color:#999;
                padding-left:10px;
            }

            .footer{
                margin-top:40px;
                font-size:.9rem;
                color:#777;
            }

            .modal-bg{
                display:none;
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:rgba(0,0,0,.65);
                justify-content:center;
                align-items:center;
                padding:20px;
            }

            .modal{
                background:white;
                color:black;
                width:100%;
                max-width:420px;
                border-radius:30px;
                padding:30px;
            }

            .modal h2{
                text-align:center;
                margin-bottom:25px;
            }

            .modal-link{
                background:#f3f3f3;
                padding:20px;
                border-radius:20px;
                margin-bottom:20px;
                text-align:center;
            }

            .share-buttons{
                display:flex;
                justify-content:center;
                gap:15px;
                flex-wrap:wrap;
            }

            .share-buttons button{
                border:none;
                padding:12px 18px;
                border-radius:12px;
                cursor:pointer;
                font-weight:600;
            }

            .close-btn{
                margin-top:25px;
                width:100%;
                padding:14px;
                border:none;
                border-radius:14px;
                background:black;
                color:white;
                cursor:pointer;
            }

            @media(max-width:600px){
                .username{
                    font-size:2.3rem;
                }

                .bio{
                    font-size:1rem;
                }

                .link-name{
                    font-size:1.1rem;
                }
            }
        </style>

        <script src="https://kit.fontawesome.com/7f6f6f6f6f.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <div class="container">
            <div class="profile">
                <img src="photo.png" alt="Michael Vargas">
                <div class="username">Michael Vargas Loza</div>
                <div class="bio">
                    💻 Systems Engineer & Business Administrator<br>
                    📈 Full Stack Developer <br>
                    🤖 AI Integrations & GenAI Enthusiast<br>
                    🚀 GDG Organizer La Paz
                </div>
            </div>
            <div class="socials">
                <a href="https://www.instagram.com/michaelvl93?igsh=OTRhcXFvNW1hcG8z" target="_blank">📷</a>
                <a href="https://www.facebook.com/share/1NNhZ47sik/" target="_blank">📘</a>
                <a href="https://www.linkedin.com/in/michaelvargasloza" target="_blank">💼</a>
                <a href="https://youtube.com/@michaelvargasdeveloper" target="_blank">▶️</a>
                <a href="https://github.com/michaelvargasloza" target="_blank">💻</a>
            </div>
            <div id="links"></div>
            <div class="footer">© 2026 Michael Vargas Loza</div>
        </div>

        <div class="modal-bg" id="modal">
            <div class="modal">
                <h2>Compartir enlace</h2>
                <div class="modal-link" id="modalTitle"></div>
                <div class="share-buttons">
                    <button onclick="copyLink()">Copiar</button>
                    <button onclick="shareNative()">Compartir</button>
                    <button onclick="openWhatsapp()">WhatsApp</button>
                </div>
                <button class="close-btn" onclick="closeModal()">Cerrar</button>
            </div>
        </div>

        <script>

            const links = [
                {
                    name:"Facebook",
                    url:"https://www.facebook.com/share/1NNhZ47sik/"
                },

                {
                    name:"Instagram",
                    url:"https://www.instagram.com/michaelvl93?igsh=OTRhcXFvNW1hcG8z"
                },

                {
                    name:"LinkedIn",
                    url:"https://www.linkedin.com/in/michaelvargasloza"
                },

                {
                    name:"YouTube",
                    url:"https://youtube.com/@michaelvargasdeveloper"
                },

                {
                    name:"GitHub",
                    url:"https://github.com/michaelvargasloza"
                }
            ];

            const container = document.getElementById("links");

            let currentUrl = "";
            let currentTitle = "";

            links.forEach(link=>{

                container.innerHTML += `

                <div class="link-card">

                <div
                class="link-name"
                onclick="openSocial('${link.name}')">
                ${link.name}
                </div>

                <div
                class="menu-btn"
                onclick="openShare(event,'${link.name}','${link.url}')">
                ⋮
                </div>

                </div>

                `;

            });

            function openShare(event,title,url){
                event.stopPropagation();

                currentUrl=url;
                currentTitle=title;

                document.getElementById("modalTitle").innerHTML=
                `<strong>${title}</strong><br>${url}`;

                document.getElementById("modal").style.display="flex";
            }

            function closeModal(){
                document.getElementById("modal").style.display="none";
            }

            function copyLink(){
                navigator.clipboard.writeText(currentUrl);
                alert("Enlace copiado");
            }

            async function shareNative(){

                if(navigator.share){

                    await navigator.share({
                    title:currentTitle,
                    url:currentUrl
                    });

                } else {
                    copyLink();
                }
            }

            function openWhatsapp(){
                window.open(
                `https://wa.me/?text=${encodeURIComponent(currentUrl)}`,
                '_blank'
                );
            }

            function openSocial(platform) {

                const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                const links = {
                    facebook: {
                        app: "fb://facewebmodal/f?href=https://www.facebook.com/share/1NNhZ47sik/",
                        web: "https://www.facebook.com/share/1NNhZ47sik/"
                    },

                    instagram: {
                        app: "instagram://user?username=michaelvl93",
                        web: "https://www.instagram.com/michaelvl93"
                    },

                    linkedin: {
                        app: "linkedin://in/michaelvargasloza",
                        web: "https://www.linkedin.com/in/michaelvargasloza"
                    },

                    youtube: {
                        app: "vnd.youtube://youtube.com/@michaelvargasdeveloper",
                        web: "https://youtube.com/@michaelvargasdeveloper"
                    },

                    github: {
                        web: "https://github.com/michaelvargasloza"
                    }
                };

                const item = links[platform.toLowerCase()];

                if (!item) return;

                if (!isMobile || !item.app) {
                    window.open(item.web, "_blank");
                    return;
                }

                const start = Date.now();

                window.location = item.app;

                setTimeout(() => {

                    if (Date.now() - start < 2500) {
                        window.location = item.web;
                    }

                }, 1200);
            }
        </script>
    </body>
</html>
